$kind: http-request
description: Creates a real user in MongoDB. The server stores passwordHash, not the plain password.
url: "{{baseUrl}}/api/v1/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "{{authEmail}}",
      "password": "{{authPassword}}",
      "firstName": "Tesnim",
      "lastName": "Hamici",
      "languages": ["fr", "en"],
      "role": "LEARNER"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 201', function () {
        pm.response.to.have.status(201);
      });

      const payload = pm.response.json().data || {};
      if (payload.accessToken) {
        pm.collectionVariables.set('accessToken', payload.accessToken);
      }
    language: text/javascript
order: 2500
