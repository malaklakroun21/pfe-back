$kind: http-request
description: Shows the expected 401 response for bad credentials.
url: "{{baseUrl}}/api/v1/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "{{authEmail}}",
      "password": "wrong-password"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 401', function () {
        pm.response.to.have.status(401);
      });
    language: text/javascript
order: 4000
